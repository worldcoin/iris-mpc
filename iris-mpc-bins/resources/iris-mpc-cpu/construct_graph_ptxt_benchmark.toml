distance_fn = "MinRotation"
distance_ops = "Fhd"
hnsw_prf_seed = 42

[irises]
option = "Random"
number = 100000
seed = 42
output_path = "data/store.ndjson"

[searcher]
layer_mode = { LinearScan = { max_graph_layer = 1 } }

[searcher.params]
option = "Standard"
ef_constr = 320
ef_search = 320
M = 256

[output]
base_directory = "data/"
filename_stem = "graph"
checkpoints = { Values = [1, 10, 100, 1000, 10000, 100000] }
