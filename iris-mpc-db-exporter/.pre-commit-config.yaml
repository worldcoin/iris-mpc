repos:
  - repo: local
    hooks:
      - id: go fmt
        name: go format
        entry: go fmt
        language: golang
        types: [go]
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        types: [ go ]
        language: golang
        require_serial: true
        pass_filenames: false
