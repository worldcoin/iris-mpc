# POP-3931 — `modifications` retention CronJob (prod, ampc-hnsw clusters). Mirrors the
# stage deploy (common-cronjob 1.11.0 via wf-cluster-apps). Scope: the HNSW (hawk) DB's
# modifications copy — the hawk server writes a row per signup-modification into its own
# DB and nothing deletes it in steady state. The GPU MPCV2 DB's copy gets its own reaper
# instance in a follow-up (same binary, values + cluster-apps entry only).
image: "ghcr.io/worldcoin/retention-reaper:v0.32.6@sha256:366cc7dcd9e9132bbfe2b5719332ff8d1f301ed5b487cbfc458fbc97cca92ace"

# ENABLED IN DRY-RUN (POP-4134 prod enablement): un-suspended + ENABLED + DRY_RUN=true —
# runs daily and PREVIEWS the guarded DELETE (read-only COUNT, no rows removed). Expect
# would-delete 0 until ~30d after the prod created_at migration (backfill) + the
# newest-10k floor. Flip DRY_RUN to "false" per the POP-4134 ladder once previews + the
# POP-4136 monitors look right.
suspend: false

env:
  RETENTION__ENABLED: "true"
  RETENTION__DRY_RUN: "true"

replicaCount: 1

environment: prod

# Daily, 04:00 UTC — offset from the anon-stats reaper (03:30) so the two never overlap.
schedule: "0 4 * * *"
backoffLimit: 0

concurrencyPolicy: Forbid

imagePullSecrets:
  - name: github-secret

resources:
  limits:
    cpu: "500m"
    memory: 256Mi
  requests:
    cpu: "100m"
    memory: 128Mi

nodeSelector:
  kubernetes.io/arch: amd64
