    value: prod
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_HNSW_URL
        name: application
  - name: SERVICE_NAME
    value: ampc-hnsw-db-exporter-1
  - name: AWS_REGION
    value: eu-north-1
  - name: GIN_MODE
    value: release
  - name: FORCE_OVERRIDE_SCHEMA_NAME
    value: "true"
  - name: OVERRIDDEN_SCHEMA_NAME
    value: "SMPC_rerand_genesis_restored_v2_prod_1"
