    value: "ampc-hnsw-db-exporter-store-node-1-prod--eun1-az3--x-s3"
  - name: NODE_ID
    value: "1"

attachSecurityGroupPolicy:
  enabled: true
  groupIds:
    - sg-0f19328fedc352148 # smpc1-prod ampc-hnsw-db-exporter pod sg
