image: "ghcr.io/worldcoin/anon-stats-server:v0.31.12@sha256:2c6e9fd6059b1fecd3b9f004205a53e82e8acbe829befc2c8f228b47134f247f"

environment: prod
replicaCount: 1

# Common environment variables shared across all anon-stats-server smpcv2 nodes.
# Defined as a map so Helm deep-merges with per-node env maps.
env:
  RUST_LOG: "info"
  SMPC__ENVIRONMENT: "prod"
  SMPC__SNS_BUFFER_BUCKET_NAME: "wf-smpcv2-prod-sns-buffer"
  SMPC__DB_URL:
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_URL
        name: application
  SMPC__SERVICE_PORTS: '["4000","4001","4002"]'
  SMPC__SERVER_COORDINATION__IMAGE_NAME: $(IMAGE_NAME)
  SMPC__RESULTS_TOPIC_ARN:
    valueFrom:
      secretKeyRef:
        key: SNS_RESULTS_ARN
        name: application
  SMPC__AWS__REGION: "eu-north-1"
  SMPC__SERVER_COORDINATION__HEARTBEAT_INITIAL_RETRIES: "5"
  SMPC__SERVER_COORDINATION__HTTP_QUERY_RETRY_DELAY_MS: "5000"
  SMPC__SERVER_COORDINATION__HEARTBEAT_INTERVAL_SECS: "3"
  SMPC__SERVER_COORDINATION__SHUTDOWN_LAST_RESULTS_SYNC_TIMEOUT_SECS: "10"
  SMPC__SERVICE__METRICS__HOST:
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  SMPC__SERVICE__METRICS__PORT: "8125"
  SMPC__SERVICE__METRICS__QUEUE_SIZE: "5000"
  SMPC__SERVICE__METRICS__BUFFER_SIZE: "256"
  SMPC__N_BUCKETS_1D: "375"
  SMPC__N_BUCKETS_2D: "375"
  SMPC__N_BUCKETS_1D_REAUTH: "500"
  SMPC__N_BUCKETS_2D_REAUTH: "500"
  SMPC__MIN_1D_JOB_SIZE: "65536"
  SMPC__MIN_1D_JOB_SIZE_MIRROR: "16384"
  SMPC__MIN_2D_JOB_SIZE: "1024"
  SMPC__MIN_2D_JOB_SIZE_MIRROR: "256"
  SMPC__MIN_1D_JOB_SIZE_REAUTH: "1000"
  SMPC__MIN_2D_JOB_SIZE_REAUTH: "1000"
  SMPC__NHD_THRESHOLD_RATIO: "0.4"
  SMPC__POLL_INTERVAL_SECS: "30"
  SMPC__TLS__PRIVATE_KEY: "/etc/ssl/private/key.pem"
  SMPC__TLS__LEAF_CERT: "/etc/ssl/private/certificate.crt"
  SMPC__TLS__ROOT_CERTS: '["/usr/local/share/ca-certificates/ca_smpcv2_party_prod_0.crt", "/usr/local/share/ca-certificates/ca_smpcv2_party_prod_1.crt", "/usr/local/share/ca-certificates/ca_smpcv2_party_prod_2.crt"]'

strategy:
  type: Recreate

datadog:
  enabled: true

hostNetwork: false

ports:
  - containerPort: 3000
    name: health
    protocol: TCP
  - containerPort: 4000
    name: tcp-4000
    protocol: TCP
  - containerPort: 4001
    name: tcp-4001
    protocol: TCP
  - containerPort: 4002
    name: tcp-4002
    protocol: TCP
  - containerPort: 4100
    name: tcp-4100
    protocol: TCP
  - containerPort: 4101
    name: tcp-4101
    protocol: TCP
  - containerPort: 4102
    name: tcp-4102
    protocol: TCP

startupProbe:
  httpGet:
    path: /health
    port: health

livenessProbe:
  httpGet:
    path: /health
    port: health

readinessProbe:
  periodSeconds: 20
  failureThreshold: 4
  httpGet:
    path: /health
    port: health

resources:
  limits:
    cpu: "14"
    memory: 40Gi
  requests:
    cpu: "14"
    memory: 40Gi

imagePullSecrets:
  - name: github-secret

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534

mountSSLCerts:
  enabled: true
  mountPath: /etc/ssl/private
