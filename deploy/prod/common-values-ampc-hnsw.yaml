image: "ghcr.io/worldcoin/iris-mpc-cpu:v0.31.10@sha256:cf2f715c66748171940b448163f6b0e0ce7dedae783282b43b135fc2589f4f29"

environment: prod
replicaCount: 0

# Common environment variables shared across all hnsw nodes.
# Defined as a map (keyed by variable name) so Helm deep-merges these with the
# per-node `env` maps in each ampc-hnsw-N-prod/values-ampc-hnsw.yaml.
env:
  RUST_LOG: "info"
  RUST_BACKTRACE: "full"
  SMPC__ENVIRONMENT: "prod"
  SMPC__CPU_DATABASE__URL:
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_HNSW_URL
        name: application
  SMPC__MAX_DB_SIZE: "20000000"
  SMPC__MAX_BATCH_SIZE: "8"
  SMPC__BATCH_SYNC_POLLING_TIMEOUT_SECS: "30"
  SMPC__PROCESSING_TIMEOUT_SECS: "1240"
  SMPC__HAWK_STREAM_PARALLELISM: "32"
  SMPC__DISABLE_PERSISTENCE: "true"
  SMPC__ENABLE_REAUTH: "true"
  SMPC__ENABLE_RESET: "true"
  SMPC__ENABLE_DELETION: "true"
  SMPC__LUC_ENABLED: "true"
  SMPC__LUC_LOOKBACK_RECORDS: "5"
  SMPC__LUC_SERIAL_IDS_FROM_SMPC_REQUEST: "false"
  SMPC__AWS__REGION: "eu-north-1"
  SMPC__SERVICE_PORTS: '["4000","4001","4002"]'
  SMPC__SERVER_COORDINATION__IMAGE_NAME: $(IMAGE_NAME)
  SMPC__SERVER_COORDINATION__STARTUP_SYNC_TIMEOUT_SECS: "3600"
  SMPC__SERVER_COORDINATION__HEARTBEAT_INITIAL_RETRIES: "65"
  SMPC__SERVER_COORDINATION__HTTP_QUERY_RETRY_DELAY_MS: "5000"
  SMPC__SERVER_COORDINATION__HEARTBEAT_INTERVAL_SECS: "3"
  SMPC__SERVER_COORDINATION__SHUTDOWN_LAST_RESULTS_SYNC_TIMEOUT_SECS: "60"
  SMPC__SERVER_COORDINATION__HEALTHCHECK_PORTS: '["8000","8000","8000"]'
  SMPC__SHARES_BUCKET_NAME: "wf-mpc-prod-smpcv2-sns-requests"
  SMPC__SCHEMA_NAME: "SMPC_rerand"
  SMPC__HNSW_SCHEMA_NAME_SUFFIX: "_genesis_restored_v2"
  SMPC__ENABLE_S3_IMPORTER: "true"
  SMPC__DB_CHUNKS_FOLDER_NAME: "hnsw_even_odd_with_version_id_output_16k"
  SMPC__LOAD_CHUNKS_PARALLELISM: "64"
  SMPC__LOAD_CHUNKS_BUFFER_SIZE: "1024"
  SMPC__REQUESTS_QUEUE_URL:
    valueFrom:
      secretKeyRef:
        key: SQS_URL
        name: application
  SMPC__RESULTS_TOPIC_ARN:
    valueFrom:
      secretKeyRef:
        key: SNS_RESULTS_ARN
        name: application
  SMPC__KMS_KEY_ARNS:
    valueFrom:
      secretKeyRef:
        key: KMS_KEYS
        name: application
  SMPC__HEARTBEAT_INITIAL_RETRIES: "65"
  SMPC__SERVICE__METRICS__HOST:
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  SMPC__SERVICE__METRICS__PORT: "8125"
  SMPC__SERVICE__METRICS__QUEUE_SIZE: "5000"
  SMPC__SERVICE__METRICS__BUFFER_SIZE: "256"
  SMPC__ENABLE_MODIFICATIONS_SYNC: "true"
  SMPC__ENABLE_MODIFICATIONS_REPLAY: "true"
  SMPC__GRAPH_CHECKPOINT_BUCKET_REGION: "eu-central-1"
  # Parallelism settings
  SMPC__HAWK_REQUEST_PARALLELISM: "96"
  SMPC__HAWK_CONNECTION_PARALLELISM: "96"
  SMPC__SEPARATE_TOKIO_CORES_PER_NODE: "32"
  # HNSW parameter settings
  SMPC__HNSW_PARAM_EF_CONSTR: "320"
  SMPC__HNSW_PARAM_EF_SEARCH: "320"
  SMPC__HNSW_PARAM_M: "320"
  SMPC__HNSW_LAYER_DENSITY: "240"
  SMPC__TLS__PRIVATE_KEY: "/etc/ssl/private/key.pem"
  SMPC__TLS__LEAF_CERT: "/etc/ssl/private/certificate.crt"
  SMPC__TLS__ROOT_CERTS: '["/usr/local/share/ca-certificates/ca_party_prod_0.crt", "/usr/local/share/ca-certificates/ca_party_prod_1.crt", "/usr/local/share/ca-certificates/ca_party_prod_2.crt"]'

strategy:
  type: Recreate

datadog:
  enabled: true

hostNetwork: false

ports:
  - containerPort: 8000
    name: health
    protocol: TCP
  - containerPort: 4000
    name: tcp-4000
    protocol: TCP
  - containerPort: 4001
    name: tcp-4001
    protocol: TCP
  - containerPort: 4002
    name: tcp-4002
    protocol: TCP
  - containerPort: 4100
    name: tcp-4100
    protocol: TCP
  - containerPort: 4101
    name: tcp-4101
    protocol: TCP
  - containerPort: 4102
    name: tcp-4102
    protocol: TCP

livenessProbe:
  httpGet:
    path: /health
    port: health

readinessProbe:
  periodSeconds: 30
  httpGet:
    path: /ready
    port: health

startupProbe:
  initialDelaySeconds: 900
  failureThreshold: 120
  periodSeconds: 30
  httpGet:
    path: /ready
    port: health

resources:
  limits:
    cpu: 188
    memory: 2720Gi
  requests:
    cpu: 188
    memory: 2720Gi

imagePullSecrets:
  - name: github-secret

podAnnotations:
  karpenter.sh/do-not-disrupt: "true"

nodeSelector:
  kubernetes.io/arch: arm64
  karpenter.sh/capacity-type: on-demand
  node.kubernetes.io/instance-type: "x8g.48xlarge"
  topology.k8s.aws/zone-id: "euc1-az1"

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534

preStop:
  # preStop.sleepPeriod specifies the time spent in Terminating state before SIGTERM is sent
  sleepPeriod: 10

# terminationGracePeriodSeconds specifies the grace time between SIGTERM and SIGKILL
# long enough to allow for graceful shutdown to safely process 2 batches
# single batch timeout in stage is 240 seconds
terminationGracePeriodSeconds: 500

mountSSLCerts:
  enabled: true
  mountPath: /etc/ssl/private
