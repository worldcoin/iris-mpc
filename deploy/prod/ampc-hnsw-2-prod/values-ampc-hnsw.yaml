# Per-node overrides. Shared vars live in deploy/prod/common-values-ampc-hnsw.yaml
# and are deep-merged with this map by Helm.
env:
  SMPC__SERVICE__SERVICE_NAME: "hnsw-service-2"
  SMPC__SERVER_COORDINATION__PARTY_ID: "2"
  SMPC__SERVER_COORDINATION__NODE_HOSTNAMES: '["pod.0.prod.hnsw.worldcoin.org", "pod.1.prod.hnsw.worldcoin.org", "0.0.0.0"]'
  SMPC__DB_CHUNKS_BUCKET_NAME: "ampc-hnsw-db-exporter-store-node-2-prod--eun1-az3--x-s3"
  SMPC__GRAPH_CHECKPOINT_BUCKET_NAME: "ampc-hnsw-graph-store-node-2-prod-eu-central-1"
  SMPC__SERVICE__METRICS__PREFIX: "hnsw-2"

initContainer:
  enabled: true
  image: "amazon/aws-cli:2.17.62"
  name: "hnsw-mpc-dns-records-updater"
  env:
    - name: PARTY_ID
      value: "2"
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  configMap:
    init.sh: |
      #!/usr/bin/env bash

      # Set up environment variables
      HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name --dns-name "$PARTY_ID".prod.hnsw.worldcoin.org --query "HostedZones[0].Id" --output text)

      # Generate the JSON content in memory
      BATCH_JSON=$(cat <<EOF
      {
        "Comment": "Upsert the A record for HNSW pod",
        "Changes": [
          {
            "Action": "UPSERT",
            "ResourceRecordSet": {
              "Name": "pod.$PARTY_ID.prod.hnsw.worldcoin.org",
              "TTL": 5,
              "Type": "A",
              "ResourceRecords": [{
                "Value": "$POD_IP"
              }]
            }
          }
        ]
      }
      EOF
      )

      # Execute AWS CLI command with the generated JSON
      aws route53 change-resource-record-sets --hosted-zone-id "$HOSTED_ZONE_ID" --change-batch "$BATCH_JSON"

attachSecurityGroupPolicy:
  enabled: true
  groupIds:
  - sg-031140954c05d1255 # smpc2-prod ampc-hnsw pod sg
