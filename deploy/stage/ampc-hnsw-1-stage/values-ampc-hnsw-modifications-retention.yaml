# POP-3931 — modifications retention (retention-reaper), party 1 (stage). Per-node.
# Reaps the HNSW (hawk) DB's modifications copy — the hawk server (shared server binary)
# writes a row per signup-modification into its own DB; nothing deletes it in steady
# state (genesis Final-Cleanup is a one-off, not a cadence). The GPU MPCV2 DB's copy
# grows the same way; its own reaper instance follows shortly after this one.
#
# Guard anatomy (ANDed onto the binary's own created_at < now() - 30 days conjunct):
#   - status/persisted: only terminal, fully-persisted rows (never in-flight)
#   - id < MIN(id of newest 10000 rows): always retain the newest 10k regardless — keeps
#     the cross-party startup-sync window intact (sync compares the newest
#     max_modifications_lookback rows by id, default 328 ≈ 30x margin) AND guarantees
#     the MAX(id)+1 assignment trigger can never see an emptied table (id reuse).
#     Matters on quiet parties where 30 days can hold fewer rows than the sync window.
env:
  RUST_LOG: "info"
  RETENTION__DB_SCHEMA: "SMPC_stage_1"
  RETENTION__PARTY: "1"
  RETENTION__SERVICE__SERVICE_NAME: "retention-reaper-modifications-hnsw-1"
  RETENTION__SERVICE__METRICS__PORT: "8125"
  RETENTION__SERVICE__METRICS__QUEUE_SIZE: "5000"
  RETENTION__SERVICE__METRICS__BUFFER_SIZE: "256"
  RETENTION__SERVICE__METRICS__PREFIX: "retention-reaper-modifications-hnsw-1"
  RETENTION__DB_URL:
    valueFrom:
      secretKeyRef:
        name: application
        key: DATABASE_AURORA_HNSW_URL
  RETENTION__SERVICE__METRICS__HOST:
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  RETENTION_JOBS: >-
    [{"table":"modifications","ts_column":"created_at","retention":"30 days",
    "batch_size":2000,"batch_pause_ms":250,
    "guard":"status = 'COMPLETED' AND persisted AND id < (SELECT COALESCE(MIN(id), 0) FROM (SELECT id FROM modifications ORDER BY id DESC LIMIT 10000) newest)"}]

# ampc-hnsw pod SG — in-region path to the HNSW Aurora, same SG the hawk service uses.
attachSecurityGroupPolicy:
  enabled: true
  groupIds:
    - sg-08db186c88dfc689b # ampc-hnsw-1-stage pod SG
