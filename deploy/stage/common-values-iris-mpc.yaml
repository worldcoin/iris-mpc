image: "ghcr.io/worldcoin/iris-mpc:dc0d24635bc49bdb812f784ba04d0dafcfa962bf"

environment: stage
replicaCount: 1

strategy:
  type: Recreate

datadog:
  enabled: true

ports:
  - containerPort: 3000
    name: health
    protocol: TCP

livenessProbe:
  httpGet:
    path: /health
    port: health

readinessProbe:
  periodSeconds: 30
  httpGet:
    path: /ready
    port: health

startupProbe:
  initialDelaySeconds: 60
  failureThreshold: 120
  periodSeconds: 30
  httpGet:
    path: /ready
    port: health

resources:
  limits:
    cpu: 80
    memory: 900Gi
    nvidia.com/gpu: 8
    vpc.amazonaws.com/efa: 4
  requests:
    cpu: 80
    memory: 900Gi
    nvidia.com/gpu: 8
    vpc.amazonaws.com/efa: 4

imagePullSecrets:
  - name: github-secret

nodeSelector:
  node.kubernetes.io/instance-type: "p4d.24xlarge"

hostNetwork: true

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "gpuGroup"
    effect: "NoSchedule"

keelPolling:
  # -- Specifies whether keel should poll for container updates
  enabled: true

preStop:
  # preStop.sleepPeriod specifies the time spent in Terminating state before SIGTERM is sent
  sleepPeriod: 10

# terminationGracePeriodSeconds specifies the grace time between SIGTERM and SIGKILL
terminationGracePeriodSeconds: 120
