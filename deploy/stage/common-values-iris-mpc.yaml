image: "ghcr.io/worldcoin/iris-mpc:d02eea8b25f96b7d633b48c8013538863af65591"

environment: stage
replicaCount: 1

# Common environment variables shared across all iris-mpc nodes.
# Defined as a map so Helm deep-merges with per-node env maps.
env:
  RUST_LOG: "debug"
  RUST_BACKTRACE: "full"
  NCCL_SOCKET_IFNAME: "ens,eth"
  NCCL_IB_CUDA_SUPPORT: "1"
  NCCL_COMM_ID: "iris-mpc-node.1.stage.smpcv2.worldcoin.dev:4000"
  SMPC__ENVIRONMENT: "stage"
  SMPC__DATABASE__URL:
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_URL
        name: application
  SMPC__DATABASE__MIGRATE: "true"
  SMPC__DATABASE__CREATE: "true"
  SMPC__DATABASE__LOAD_PARALLELISM: "8"
  SMPC__DISABLE_PERSISTENCE: "false"
  SMPC__ANON_STATS_DATABASE__URL:
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_URL
        name: application
  SMPC__ANON_STATS_DATABASE__MIGRATE: "false"
  SMPC__ANON_STATS_DATABASE__CREATE: "false"
  SMPC__ANON_STATS_DATABASE__LOAD_PARALLELISM: "8"
  SMPC__AWS__REGION: "eu-north-1"
  SMPC__REQUESTS_QUEUE_URL:
    valueFrom:
      secretKeyRef:
        key: SQS_URL
        name: application
  SMPC__RESULTS_TOPIC_ARN:
    valueFrom:
      secretKeyRef:
        key: SNS_RESULTS_ARN
        name: application
  SMPC__PROCESSING_TIMEOUT_SECS: "120"
  SMPC__PATH: "/data/"
  SMPC__KMS_KEY_ARNS:
    valueFrom:
      secretKeyRef:
        key: KMS_KEYS
        name: application
  SMPC__SERVER_COORDINATION__NODE_HOSTNAMES: '["iris-mpc-node.1.stage.smpcv2.worldcoin.dev","iris-mpc-node.2.stage.smpcv2.worldcoin.dev","iris-mpc-node.3.stage.smpcv2.worldcoin.dev"]'
  SMPC__SERVER_COORDINATION__IMAGE_NAME: $(IMAGE_NAME)
  SMPC__SERVER_COORDINATION__HEARTBEAT_INITIAL_RETRIES: "65"
  SMPC__SERVER_COORDINATION__HEARTBEAT_INTERVAL_SECS: "3"
  SMPC__PUBLIC_KEY_BASE_URL: "https://pki-smpcv2-stage.worldcoin.org"
  SMPC__SHARES_BUCKET_NAME: "wf-smpcv2-stage-sns-requests"
  SMPC__ENABLE_S3_IMPORTER: "true"
  SMPC__DB_CHUNKS_FOLDER_NAME: "even_odd_with_version_id_output_16k"
  SMPC__LOAD_CHUNKS_PARALLELISM: "64"
  SMPC__LOAD_CHUNKS_BUFFER_SIZE: "1024"
  SMPC__CLEAR_DB_BEFORE_INIT: "true"
  SMPC__INIT_DB_SIZE: "0" # "1200000"
  SMPC__MAX_DB_SIZE: "100000" # "1300000"
  SMPC__MAX_BATCH_SIZE: "64"
  SMPC__BATCH_POLL_ABORT_AFTER_SECS: "60"
  SMPC__MATCH_DISTANCES_BUFFER_SIZE_EXTRA_PERCENT: "500"
  SMPC__MATCH_DISTANCES_BUFFER_SIZE: "64"
  SMPC__MATCH_DISTANCES_2D_BUFFER_SIZE: "64"
  SMPC__ENABLE_REAUTH: "true"
  SMPC__ENABLE_RESET: "true"
  SMPC__ENABLE_RECOVERY: "true"
  SMPC__LUC_ENABLED: "false"
  SMPC__LUC_LOOKBACK_RECORDS: "50"
  SMPC__LUC_SERIAL_IDS_FROM_SMPC_REQUEST: "true"
  SMPC__SERVICE__METRICS__HOST:
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  SMPC__SERVICE__METRICS__PORT: "8125"
  SMPC__SERVICE__METRICS__QUEUE_SIZE: "5000"
  SMPC__SERVICE__METRICS__BUFFER_SIZE: "256"
  SMPC__RETURN_PARTIAL_RESULTS: "true"
  SMPC__ENABLE_MODIFICATIONS_SYNC: "true"
  SMPC__ENABLE_MODIFICATIONS_REPLAY: "true"
  SMPC__ENABLE_DEBUG_TIMING: "true"

strategy:
  type: Recreate

datadog:
  enabled: true

ports:
  - containerPort: 3000
    name: health
    protocol: TCP

livenessProbe:
  httpGet:
    path: /health
    port: health

readinessProbe:
  periodSeconds: 30
  httpGet:
    path: /ready
    port: health

startupProbe:
  initialDelaySeconds: 60
  failureThreshold: 120
  periodSeconds: 30
  httpGet:
    path: /ready
    port: health

resources:
  limits:
    cpu: 28
    memory: 100Gi
    nvidia.com/gpu: 1
    vpc.amazonaws.com/efa: 1
  requests:
    cpu: 27
    memory: 99Gi
    nvidia.com/gpu: 1
    vpc.amazonaws.com/efa: 1

imagePullSecrets:
  - name: github-secret

nodeSelector:
  kubernetes.io/arch: amd64

hostNetwork: true

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "gpuGroup"
    effect: "NoSchedule"

keelPolling:
  # -- Specifies whether keel should poll for container updates
  enabled: true

preStop:
  # preStop.sleepPeriod specifies the time spent in Terminating state before SIGTERM is sent
  sleepPeriod: 10

# terminationGracePeriodSeconds specifies the grace time between SIGTERM and SIGKILL
terminationGracePeriodSeconds: 120
