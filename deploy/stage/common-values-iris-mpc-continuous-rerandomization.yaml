image: "ghcr.io/worldcoin/rerandomization-protocol:9ada456f64ffff48a2bbb3634859e00c7636faae"
replicaCount: 1

environment: stage

command: ["/bin/rerandomize-db"]
args:
  - "rerandomize-continuous"

serviceAccount:
  create: true
  name: "iris-mpc-continuous-rerandomization"

ports:
  - containerPort: 3000
    name: health
    protocol: TCP

podSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534

imagePullSecrets:
  enabled: true
  secretName: github-secret

resources:
  limits:
    cpu: 3.5
    memory: 12Gi
  requests:
    cpu: 3.5
    memory: 12Gi

nodeSelector:
  kubernetes.io/arch: amd64
  workload: "rerandomization"

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "continuousDbRerandomization"
    effect: "NoSchedule"

concurrencyPolicy: Replace
