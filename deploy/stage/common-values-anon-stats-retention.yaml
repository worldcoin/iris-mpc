# POP-3905 — anon-stats retention CronJob (stage). Runs the generic retention-reaper image
# (one binary for all append-only-table retention); the RETENTION_JOBS config (per-node
# file) lists this DB's tables. Prod is suspended until the observability gate passes.
image: "ghcr.io/worldcoin/retention-reaper:latest"
environment: stage
schedule: "30 3 * * *"
restartPolicy: OnFailure
backoffLimit: 3
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 5
ttlSecondsAfterFinished: 86400
suspend: false
datadog:
  enabled: true
imagePullSecrets:
  enabled: true
  secretName: github-secret
serviceAccount:
  create: true
nodeSelector:
  kubernetes.io/arch: amd64
resources:
  limits:
    cpu: "500m"
    memory: 256Mi
  requests:
    cpu: "100m"
    memory: 128Mi
