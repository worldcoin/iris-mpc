# POP-3905 — anon-stats retention (retention-reaper), hnsw party 0 (stage). Per-node env.
# Fully generic RETENTION_* config (no service-specific config). DB schema anon_stats_mpc
# matches anon-stats-server; guard=processed=TRUE reaps only collected rows.
env:
  - name: RUST_LOG
    value: "info"
  - name: RETENTION_DB_URL
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_URL
        name: application
  - name: RETENTION_DB_SCHEMA
    value: "anon_stats_mpc"
  - name: RETENTION_PARTY
    value: "0"
  - name: RETENTION_SERVICE_NAME
    value: "retention-reaper-anon-stats-hnsw-0"
  - name: RETENTION_METRICS_HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: RETENTION_METRICS_PORT
    value: "8125"
  - name: RETENTION_METRICS_PREFIX
    value: "retention-reaper-anon-stats-hnsw-0"
  - name: RETENTION_JOBS
    value: '[{"table":"anon_stats_1d","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_1d_lifted","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_2d","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_2d_lifted","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_face","retention":"14 days","guard":"processed = TRUE"}]'
