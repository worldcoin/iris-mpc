# POP-3905 — anon-stats retention CronJob, ampc-hnsw party 0 (stage). Per-node overrides.
# Separate anon-stats DB from the smpcv2 cluster (own per-namespace application secret).
# Schema left at default `anon_stats_mpc` to match ampc-hnsw-anon-stats-server.
env:
  - name: RUST_LOG
    value: "info"
  - name: SMPC__ENVIRONMENT
    value: "stage"
  - name: SMPC__DB_URL
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_URL
        name: application
  - name: SMPC__SERVER_COORDINATION__PARTY_ID
    value: "0"
  - name: SMPC__SERVICE__SERVICE_NAME
    value: "anon-stats-retention-hnsw-0"
  - name: SMPC__SERVICE__METRICS__HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: SMPC__SERVICE__METRICS__PORT
    value: "8125"
  - name: SMPC__SERVICE__METRICS__PREFIX
    value: "anon-stats-retention-hnsw-0"
  - name: RETENTION_DAYS
    value: "14"
  - name: PREMAKE_DAYS
    value: "7"
  - name: QUARANTINE_GRACE_HOURS
    value: "48"
