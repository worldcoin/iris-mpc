# POP-3905 — anon-stats retention, smpcv2 party 1 (stage). retention-reaper + RETENTION_JOBS.
# DB schema left at default anon_stats_mpc (matches anon-stats-server). guard=processed=TRUE
# so only collected rows are reaped; unprocessed rows are never deleted.
env:
  - name: RUST_LOG
    value: "info"
  - name: SMPC__ENVIRONMENT
    value: "stage"
  - name: SMPC__DB_URL
    valueFrom:
      secretKeyRef:
        key: DATABASE_AURORA_URL
        name: application
  - name: SMPC__SERVER_COORDINATION__PARTY_ID
    value: "1"
  - name: SMPC__SERVICE__SERVICE_NAME
    value: "retention-reaper-anon-stats-smpcv2-1"
  - name: SMPC__SERVICE__METRICS__HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: SMPC__SERVICE__METRICS__PORT
    value: "8125"
  - name: SMPC__SERVICE__METRICS__PREFIX
    value: "retention-reaper-anon-stats-smpcv2-1"
  - name: RETENTION_JOBS
    value: '[{"table":"anon_stats_1d","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_1d_lifted","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_2d","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_2d_lifted","retention":"14 days","guard":"processed = TRUE"},{"table":"anon_stats_face","retention":"14 days","guard":"processed = TRUE"}]'
